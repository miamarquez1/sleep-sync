<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login • SleepSync</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div class="brand"><a href="../index.html">SleepSync</a></div>
        <nav class="nav">
          <a class="nav-link" href="signup.html">Sign Up</a>
        </nav>
      </div>
    </header>

    <main class="page auth-page">
      <div class="container">
        <div class="page-card">
          <h1>Login</h1>
          <p class="helper">No backend yet. This is a UI-only demo.</p>

          <form id="login-form" class="auth-form" novalidate>
            <div class="form-field">
              <label for="login-email">Email</label>
              <input id="login-email" name="email" type="email" placeholder="you@example.com" required />
            </div>
            <div class="form-field">
              <label for="login-password">Password</label>
              <input id="login-password" name="password" type="password" placeholder="••••••••" required />
            </div>
            <button class="button primary" type="submit">Login</button>
          </form>

          <p id="auth-message" class="helper" role="status"></p>
          <p class="helper">
            Don’t have an account? <a class="text-link" href="signup.html">Create one</a>
          </p>
        </div>
      </div>
    </main>

    <script src="../js/storage.js" defer></script>
    <script src="../js/app.js" defer></script>
  </body>
</html>
